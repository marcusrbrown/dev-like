# npm trusted publishing (OIDC). Setup required on npmjs.com BEFORE first run:
#   package page -> Settings/Access -> Trusted Publisher -> GitHub Actions:
#     org: marcusrbrown, repo: dev-like, workflow: release.yaml (exact, case-sensitive)
#   then: Publishing access -> "Require 2FA and disallow tokens".
# Gotchas (verified July 2026): npm >= 11.5.1 required; package.json repository.url must
# exactly match this repo; provenance needs public repo + public package. No NPM_TOKEN /
# NODE_AUTH_TOKEN secrets are used — id-token: write + registry-url auth npm publish via OIDC.
# Version PRs are created via the mrbro-bot GitHub App (APPLICATION_ID/APPLICATION_PRIVATE_KEY).
name: Release

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      id-token: write
      pull-requests: write
    steps:
      - id: get-app-token
        name: Get Workflow Access Token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.APPLICATION_ID }}
          private-key: ${{ secrets.APPLICATION_PRIVATE_KEY }}

      - name: Setup Git user
        env:
          GH_TOKEN: ${{ steps.get-app-token.outputs.token }}
          GIT_USER_NAME: ${{ steps.get-app-token.outputs.app-slug }}[bot]
        run: |
          USER_ID=$(gh api "/users/${GIT_USER_NAME}" --jq .id)
          git config --global user.email "${USER_ID}+${GIT_USER_NAME}@users.noreply.github.com"
          git config --global user.name "${GIT_USER_NAME}"

      - name: Checkout repository
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0
        with:
          persist-credentials: false
          token: ${{ steps.get-app-token.outputs.token }}

      - name: Setup Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm for OIDC trusted publishing
        run: npm install -g npm@11.18.0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - id: changesets
        name: Create Release Pull Request or Publish
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        env:
          GITHUB_TOKEN: ${{ steps.get-app-token.outputs.token }}
        with:
          setupGitUser: false
          commit: 'chore(changesets): version packages'
          title: 'chore(🦋📦): version packages'
          version: bun run version-changesets
          publish: bun run publish-changesets
          createGithubReleases: true

      - name: Reconcile alias release tag
        if: always() && !cancelled()
        env:
          GH_TOKEN: ${{ steps.get-app-token.outputs.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: bun run alias-release
