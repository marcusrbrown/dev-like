# npm trusted publishing (OIDC). Setup required on npmjs.com BEFORE first run:
#   package page -> Settings/Access -> Trusted Publisher -> GitHub Actions:
#     org: marcusrbrown, repo: dev-like, workflow: release.yaml (exact, case-sensitive)
#   then: Publishing access -> "Require 2FA and disallow tokens".
# Gotchas (verified July 2026): npm >= 11.5.1 required; package.json repository.url must
# exactly match this repo; provenance needs public repo + public package. No NPM_TOKEN /
# NODE_AUTH_TOKEN secrets are used — id-token: write + registry-url auth npm publish via OIDC.
name: Release

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      id-token: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm for OIDC trusted publishing
        run: npm install -g npm@latest

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - id: changesets
        name: Create Release Pull Request or Publish
        uses: changesets/action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          commit: 'chore(changesets): version packages'
          title: 'chore(🦋📦): version packages'
          version: bun run version-changesets
          publish: bun run publish-changesets
