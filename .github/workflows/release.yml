# npm trusted publishing (OIDC). Setup required on npmjs.com BEFORE first run:
#   package page -> Settings/Access -> Trusted Publisher -> GitHub Actions:
#     org: marcusrbrown, repo: dev-like, workflow: release.yml (exact, case-sensitive)
#   then: Publishing access -> "Require 2FA and disallow tokens".
# Gotchas (verified July 2026): npm >= 11.5.1 required; package.json repository.url must
# exactly match this repo; provenance needs public repo + public package.
name: Release
on:
  push:
    tags: ['v*']

permissions:
  id-token: write # OIDC for npm trusted publishing
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      - run: npm install -g npm@latest # ensure npm >= 11.5.1 for OIDC
      - run: node scripts/validate.mjs
      - run: node --test tests/*.test.mjs
      - run: npm publish --provenance --access public
